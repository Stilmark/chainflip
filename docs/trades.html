<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trades — LP Parser</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdn.datatables.net/1.13.7/css/jquery.dataTables.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>
  <nav>
    <div class="nav-container">
      <a href="index.html" class="logo">LP Parser</a>
      <ul class="nav-links">
        <li><a href="index.html">Dashboard</a></li>
        <li><a href="status.html">Status</a></li>
        <li><a href="performance.html">Performance</a></li>
        <li><a href="prediction.html">Prediction</a></li>
        <li><a href="trades.html">Trades</a></li>
        <li><a href="config.html">Config</a></li>
      </ul>
    </div>
  </nav>

  <div class="container">
    <div class="trades-toolbar">
      <div class="sub-nav">
        <a href="#latest" class="active">Latest</a>
        <a href="#by-day">By Day</a>
        <a href="#distribution">Distribution</a>
      </div>

      <label class="icon-toggle" for="hide-small-fees-toggle" title="Hide small fees">
        <input id="hide-small-fees-toggle" type="checkbox" checked />
        <i class="fa-solid fa-toggle-off" aria-hidden="true"></i>
        <i class="fa-solid fa-toggle-on" aria-hidden="true"></i>
        <span>Hide small fees</span>
      </label>
    </div>

    <section id="latest" class="card">
      <div class="table-container" id="trades-latest">
        <p>Loading...</p>
      </div>
    </section>

    <section id="by-day" class="card">
      <div class="table-container" id="trades-by-day">
        <p>Loading...</p>
      </div>
    </section>

    <section id="distribution" class="card">
      <div class="table-container" id="distribution-bucket">
        <p>Loading...</p>
      </div>
    </section>
  </div>

  <footer>LP Parser &copy; 2026 &mdash; Updated <span id="footer-updated">...</span></footer>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.7/js/jquery.dataTables.min.js"></script>
  <script src="js/tables.js"></script>
  <script src="js/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const toggle = document.getElementById('hide-small-fees-toggle');

      function getTradeOptions() {
        const hideSmallFees = toggle && toggle.checked;
        return {
          filterFn: function(row) {
            if (!hideSmallFees) return true;
            return Number(row.fees_raw || 0) >= 0.01;
          }
        };
      }

      function renderTrades() {
        const options = getTradeOptions();
        LPTables.loadTable('trades-latest', 'trades-latest.json', options);
        LPTables.loadDaySelector('trades-by-day', 'trades-by-day.json', options);
      }

      renderTrades();
      if (toggle) {
        toggle.addEventListener('change', renderTrades);
      }

      LPTables.loadTable('distribution-bucket', 'distribution-bucket.json');
    });
  </script>
</body>
</html>

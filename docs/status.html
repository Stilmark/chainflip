<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Status — LP Parser</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdn.datatables.net/1.13.7/css/jquery.dataTables.min.css">
</head>
<body>
  <nav>
    <div class="nav-container">
      <a href="index.html" class="logo">LP Parser</a>
      <ul class="nav-links">
        <li><a href="index.html">Dashboard</a></li>
        <li><a href="status.html">Status</a></li>
        <li><a href="performance.html">Performance</a></li>
        <li><a href="prediction.html">Prediction</a></li>
        <li><a href="trades.html">Trades</a></li>
        <li><a href="config.html">Config</a></li>
      </ul>
    </div>
  </nav>

  <div class="container">
    <div class="sub-nav">
      <a href="#current" class="active">Current</a>
      <a href="#by-day">By Day</a>
    </div>

    <section id="current" class="card">
      <div class="table-container" id="status-current">
        <p>Loading...</p>
      </div>
      <h3>Daily Breakdown</h3>
      <div class="table-container" id="status-daily-breakdown">
        <p>Loading...</p>
      </div>
    </section>

    <section id="by-day" class="card">
      <div class="table-container" id="status-by-day">
        <p>Loading...</p>
      </div>
    </section>
  </div>

  <footer>LP Parser &copy; 2026 &mdash; Updated 2026-04-20 20:45:28 CET</footer>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.7/js/jquery.dataTables.min.js"></script>
  <script src="js/tables.js"></script>
  <script src="js/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      LPTables.loadTable('status-current', 'status-current.json');
      LPTables.loadTable('status-daily-breakdown', 'status-daily-breakdown.json', { order: [[0, 'desc']] });
      LPTables.loadDaySelector('status-by-day', 'status-by-day.json');
    });
  </script>
</body>
</html>
